schema_version: 1

context:
  name: comet-ml
  version: "3.58.2"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/07/8a/a64724f766b95649ffbebf90ae4eb7675b0de56c2f87dd4ef8eb86123440/comet_ml-${{ version }}.tar.gz
  sha256: 6073f648d82108496a59d158b303479c3e94c96b0118cb6bfc3eb8f8a8d60438

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - comet = comet_ml.scripts.comet:main
      - comet_ml.spacy.logger.v1 = comet_ml.integration.spacy:comet_logger_v1

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}
    - configobj
    - dulwich >=0.20.6,!=0.20.33,<1.0.0
    - everett >=1.0.1,<3.2.0
    - importlib-metadata
    - jsonschema >=2.6.0,!=3.1.0
    - psutil >=5.6.3
    - python-box <7.0.0
    - requests >=2.18.4
    - requests-toolbelt >=0.8.0
    - rich >=13.3.2
    - semantic_version >=2.8.0
    - sentry-sdk >=1.1.0
    - setuptools
    - simplejson
    - urllib3 >=1.26.8
    - wrapt >=1.11.2
    - wurlitzer >=1.0.2

tests:
  - python:
      imports:
        - comet_ml
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - pip check
      - comet --help
      - comet --version
      - python run_test.py
    files:
      recipe:
        - run_test.py
    requirements:
      run:
        - pip
        - python ${{ python_min }}.*

about:
  homepage: https://www.comet.com
  summary: Supercharging Machine Learning
  license: MIT
  license_file: README.rst

extra:
  recipe-maintainers:
    - jeongseok-meta

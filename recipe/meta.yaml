{% set name = "comet-ml" %}
{% set version = "3.56.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/37/73/fa09c8b19e34b29609b50172f9cb5e0ea7a2da37d286aa9406efae056bfa/comet_ml-{{ version }}.tar.gz
  sha256: 1ac17adfe9bef47a833ab337cfcd2740b78a4919fc6a2df428ef38f3239447c1

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - comet = comet_ml.scripts.comet:main
    - comet_ml.spacy.logger.v1 = comet_ml.integration.spacy:comet_logger_v1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - configobj
    - dulwich!=0.20.33,<1.0.0,>=0.20.6
    - everett >=1.0.1,<3.2.0
    - importlib-metadata
    - jsonschema >=2.6.0,!=3.1.0
    - psutil >=5.6.3
    - python-box <7.0.0
    - requests-toolbelt >=0.8.0
    - requests >=2.18.4
    - rich >=13.3.2
    - semantic_version >=2.8.0
    - sentry-sdk >=1.1.0
    - simplejson
    - urllib3 >=1.21.1
    - wrapt >=1.11.2
    - wurlitzer >=1.0.2

test:
  imports:
    - comet_ml
  commands:
    - pip check
    - comet --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.comet.com
  summary: Supercharging Machine Learning
  license: MIT
  license_file: README.rst

extra:
  recipe-maintainers:
    - jeongseok-meta
